version: '3.9'

x-cuda_pytorch_base: &cuda_pytorch_base
  # GPU support (requires Docker Engine and NVIDIA Container Toolkit)
  gpus: all
  shm_size: 8g
  environment:
    PYTHONUNBUFFERED: "1"
    MLFLOW_TRACKING_URI: "http://mlflow:5000"
  depends_on:
    - mlflow
  networks:
    - mlflow-net
  restart: unless-stopped
  tty: true

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --allowed-hosts "*"
    restart: unless-stopped
    networks:
      - mlflow-net

  cuda_pytorch_radon:
    <<: *cuda_pytorch_base
    container_name: cuda_pytorch_radon
    image: ghcr.io/sacha-phd-labs/cuda_pytorch_radon:latest
    # pull_policy: always

networks:
  mlflow-net:
    name: mlflow-net
    driver: bridge
    attachable: true